name: she_safe
description: "SheSafe - Women's Safety App with Cell Tower Triangulation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  sensors_plus: ^6.1.1
  intl: ^0.20.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^13.0.2
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  flutter_ringtone_player: ^4.0.0+3
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
